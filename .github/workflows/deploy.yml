name: Build and deploy

# One workflow: fetch live metrics → build → deploy (ARCHITECTURE.md §6).
# NOTE for first-time setup (won't go green until these are done):
#   1. Settings → Pages → Source → "GitHub Actions"
#   2. Add repo secrets DAGSHUB_USERNAME + DAGSHUB_TOKEN (token minted FRESH for
#      this repo) and repo variable MLFLOW_TRACKING_URI. Until then the metrics
#      step fails open and the site ships committed sample values.

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch: {}
  repository_dispatch:
    types: [metrics-updated] # unused today; future hook from the ML repo's retrain workflow

permissions:
  contents: write # to commit metrics.json
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Refresh live model metrics from DagsHub MLflow
        env:
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_URI: ${{ vars.MLFLOW_TRACKING_URI }}
        run: node scripts/fetch-metrics.mjs
      - name: Commit metrics.json if changed
        run: |
          git config user.name "preempt-metrics-bot"
          git config user.email "bot@users.noreply.github.com"
          git add src/data/metrics.json
          git diff --cached --quiet || git commit -m "chore: refresh live model metrics"
          git push || echo "nothing to push"
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
